# Agent OS Standards Index

## TypeScript

- **No `any` types**: Use specific types, generics, or interface augmentation instead.
- **No `as` casts**: Narrow types through guards, generics, or proper interface definitions.
- **No underscore-prefixed names**: No `_` prefix on variables, parameters, or filenames (use `helpers.ts` not `_helpers.ts`).

## Code Quality

- **No code duplication**: Extract shared logic into helpers immediately. Duplicated code is a bug magnet.
- **Thin CLI action handlers**: Extract selection logic, output logic, and repeated guards into named functions. Keep `.action()` handlers as high-level orchestration only.

## Agent Architecture

- **4-phase pipeline**: Navigator → Validator → Evaluator → Reporter.
- **Visual tagging (Set-of-Mark)**: Red bounding boxes + numeric IDs for interactive elements; blue + T-prefix for text nodes. 40-node cap with priority sorting.
- **Self-correction levels**: Within-run retry, cross-run lessons (`.qa-lessons/`), test-level correction suggestions after 3+ consecutive failures.

## Spec-Driven Development

- **Shape first**: Create `agent-os/specs/YYYY-MM-DD-description/shape.md` before touching code.
- **Plan second**: `plan.md` with numbered tasks, each with goal, files, and verification method.
- **Incremental execution**: Mark tasks `✓` (done), `*` (in-progress), `!` (failed). Never skip verification.

## Tech Stack (Approved)

- **Language**: TypeScript (strict, no `any`)
- **Runtime**: Bun
- **LLM**: Google Gemini (gemini-3-flash-preview default)
- **Agent Framework**: Google ADK (`@google/adk`)
- **Browser**: Puppeteer v24
- **CLI**: Commander.js
- **Schema validation**: Zod v4
